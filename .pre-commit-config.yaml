minimum_pre_commit_version: '3.5.0'

repos:
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.3.1
    hooks:
      - id: stylua-github
        name: stylua (Lua formatter)
        files: \.lua$
        pass_filenames: true

  - repo: local
    hooks:
      - id: biome-format
        name: biome format
        entry: biome format --write --no-errors-on-unmatched
        language: system
        files: \.(css|html|js|json|jsonc|jsx|md|ts|tsx)$
